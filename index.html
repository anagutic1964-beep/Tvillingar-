<script>
let carrito = [];

function agregarCarrito(producto){
  carrito.push(producto);
  actualizarCarrito();
}

function actualizarCarrito(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  carrito.forEach(item=>{
    let li = document.createElement("li");
    li.textContent = item;
    lista.appendChild(li);
  });
}
</script>
