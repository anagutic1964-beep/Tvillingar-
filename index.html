<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TVILLINGAR</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fff0f6;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #ff2fb3, #ff6bd6);
  color: white;
  text-align: center;
  padding: 30px 20px;
}

/* LOGO */
.logo {
  font-size: 34px;
  font-weight: bold;
  letter-spacing: 3px;
}

/* DESCRIPCIÓN */
.descripcion {
  max-width: 700px;
  margin: 10px auto;
  font-size: 14px;
  line-height: 1.5;
}

/* PRODUCTOS */
.productos {
  display: flex;
  justify-content: center;
  padding: 30px;
}

/* TARJETA */
.producto {
  width: 250px;
  background: white;
  border-radius: 20px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(255,47,179,0.15);
}

/* IMAGEN */
.producto img {
  width: 100%;
  border-radius: 15px;
}

/* BOTÓN */
button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 12px;
  background: #ff2fb3;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* WHATSAPP */
a {
  display: block;
  margin-top: 10px;
  padding: 10px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
}

/* CARRITO */
#carrito {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 200px;
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<header>
  <div class="logo">TVILLINGAR</div>
  <div class="descripcion">
    Crochet hecho a mano con amor 💖 Productos únicos y artesanales.
  </div>
</header>

<!-- CARRITO -->
<div id="carrito">
  <h3>🛒 Carrito</h3>
  <ul id="lista"></ul>
</div>

<!-- PRODUCTO -->
<div class="productos">

  <div class="producto">
    <img src="poncho.png" alt="Poncho">

    <h3>Poncho</h3>
    <p>$70.000</p>

    <button onclick="agregarCarrito('Poncho - $70.000')">
      🛒 Añadir al carrito
    </button>

    <a href="https://wa.me/56947510065?text=Hola%20quiero%20comprar%20el%20poncho">
      Comprar por WhatsApp
    </a>
  </div>

</div>

<script>
let carrito = [];

function agregarCarrito(producto){
  carrito.push(producto);
  actualizarCarrito();
}

function actualizarCarrito(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  carrito.forEach(item=>{
    let li = document.createElement("li");
    li.textContent = item;
    lista.appendChild(li);
  });
}
</script>

</body>
</html>
